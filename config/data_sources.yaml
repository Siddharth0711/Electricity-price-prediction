# Energy Sources Configuration

renewable_sources:
  solar:
    capacity_mw: 5000
    weather_features:
      - solar_irradiance
      - temperature
      - cloud_cover
    efficiency_range: [0.15, 0.22]
    
  hydro:
    capacity_mw: 3000
    weather_features:
      - rainfall
      - reservoir_level
    efficiency_range: [0.85, 0.90]
    
  wind:
    capacity_mw: 4000
    weather_features:
      - wind_speed
      - wind_direction
    efficiency_range: [0.35, 0.45]
    cut_in_speed: 3.5  # m/s
    rated_speed: 12.0
    cut_out_speed: 25.0
    
  biomass:
    capacity_mw: 1000
    weather_features: []  # Weather-independent
    efficiency_range: [0.20, 0.30]

non_renewable_sources:
  coal:
    capacity_mw: 8000
    marginal_cost_per_mwh: 45
    ramp_rate: 0.05  # 5% per hour
    min_output: 0.40  # 40% of capacity
    
  thermal_gas:
    capacity_mw: 6000
    marginal_cost_per_mwh: 65
    ramp_rate: 0.15
    min_output: 0.30
    
  nuclear:
    capacity_mw: 2000
    marginal_cost_per_mwh: 15
    ramp_rate: 0.02
    min_output: 0.80  # Base load

# Weather Features
weather_features:
  temperature:
    unit: celsius
    range: [-10, 50]
    
  solar_irradiance:
    unit: w_per_m2
    range: [0, 1200]
    
  wind_speed:
    unit: m_per_s
    range: [0, 30]
    
  wind_direction:
    unit: degrees
    range: [0, 360]
    
  rainfall:
    unit: mm_per_hour
    range: [0, 100]
    
  cloud_cover:
    unit: percentage
    range: [0, 100]
    
  humidity:
    unit: percentage
    range: [0, 100]

# Market Configuration
market:
  time_resolution: 1  # hours
  forecast_horizon: 24  # hours
  trading_fee: 0.02  # 2% of transaction
  bid_increment: 0.5  # INR/MWh
